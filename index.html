<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steve Oglesby</title>
  <meta name="description" content="Steve Oglesby — writer, thinker, Texan. Coming soon." />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Oswald:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d0f;
      color: #e8e8e8;
      font-family: 'Crimson Pro', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid rgba(255,255,255,0.1);
      margin-bottom: 1.8rem;
      filter: grayscale(20%);
    }
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.1em;
      color: #fff;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #c0392b;
      margin: 1rem auto;
    }
    .tagline {
      font-size: 1.1rem;
      font-style: italic;
      color: rgba(232,232,232,0.6);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .coming-soon {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(232,232,232,0.35);
      margin-bottom: 1.5rem;
    }
    .substack-link {
      display: inline-block;
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e8e8e8;
      text-decoration: none;
      border: 1px solid rgba(232,232,232,0.25);
      padding: 0.75rem 1.8rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .substack-link:hover {
      border-color: #e8e8e8;
      color: #fff;
    }
  </style>
</head>
